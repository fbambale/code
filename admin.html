<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - CODE Society</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="auth-container">
    <section class="card">
      <h1>Admin Portal</h1>
      <p class="muted">Authorized administrators only</p>

      <form id="admin-login-form" class="form">
        <label>Email
          <input type="email" id="admin-email" required autocomplete="username" />
        </label>
        <label>Password
          <input type="password" id="admin-password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn primary">Login as Admin</button>
        <p id="admin-login-error" class="error"></p>
      </form>

      <div id="bootstrap-admin" class="hidden">
        <hr />
        <h3>First-time Setup</h3>
        <p class="muted">No admin exists yet. Click below to make this account the first admin.</p>
        <button id="setup-admin" class="btn primary">Setup Admin</button>
        <p id="setup-status" class="muted"></p>
      </div>

      <p class="muted">Not an admin? <a href="index.html">Back to Reception Login</a></p>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('admin-login-form');
      const bootstrapDiv = document.getElementById('bootstrap-admin');
      const setupBtn = document.getElementById('setup-admin');
      const setupStatus = document.getElementById('setup-status');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('admin-email').value.trim();
        const password = document.getElementById('admin-password').value;
        const err = document.getElementById('admin-login-error');
        err.textContent = '';
        if (!window.validators.isValidEmail(email)) { err.textContent = 'Enter a valid, non-disposable email.'; return; }
        const { error } = await signIn(email, password);
        if (error) { err.textContent = error.message || 'Login failed'; return; }
        // After login, ensure hard admin if email matches
        const ensured = await ensureHardAdminProfile();
        if (ensured.error) {
          console.warn('Hard admin ensure error:', ensured.error);
        }
        // Check if any admin exists otherwise show bootstrap
        const anyAdmin = await hasAnyAdmin();
        if (!anyAdmin) {
          bootstrapDiv.classList.remove('hidden');
          setupStatus.textContent = 'Logged in. No admin exists. Use Setup Admin to promote your account.';
          return;
        }
        // verify admin role
        const profile = await getMyProfile();
        if (!profile || profile.roles?.name !== 'admin') {
          await signOut();
          err.textContent = 'Not authorized as admin.';
          return;
        }
        window.location.href = 'dashboard.html';
      });

      setupBtn.addEventListener('click', async () => {
        setupStatus.textContent = 'Setting up admin...';
        const res = await bootstrapAdminIfNone();
        if (res.error) { setupStatus.textContent = res.error.message; return; }
        if (res.created) {
          setupStatus.textContent = 'Admin created. Redirecting...';
          window.location.href = 'dashboard.html';
        } else {
          setupStatus.textContent = 'Admin already exists or cannot create.';
        }
      });
    });
  </script>
</body>
</html>
